<app-header></app-header>
<main class="min-h-screen bg-slate-900 text-slate-300 antialiased selection:bg-violet-500/30">
  <!-- Hero Section -->
  <section
    class="px-[15%] flex flex-col mx-auto items-center justify-center h-screen lg:flex-row lg:gap-20"
  >
    <app-owner></app-owner>
    <div class="grid items-center justify-center text-center">
      <h1
        class="mt-5 text-5xl font-bold tracking-tight text-white sm:text-6xl gradient-text md:text-5xl"
      >
        Leno Borges
      </h1>
      <h2 class="mt-2 text-xl leading-8 text-slate-300 md:text-2xl">SWE & Tech Educator</h2>
      <p class="text-slate-300 text-sm px-6 mt-6 text-center">
        Construindo produtos digitais escaláveis.
      </p>
      <app-links></app-links>
      <a
        routerLink="/bfacademy"
        class="mt-5 rounded-md bg-violet-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-violet-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-600 transition-colors duration-300"
      >
        Ver Case de Sucesso
      </a>
    </div>
  </section>
  <section class="py-20 px-7 sm:py-28 mx-auto container lg:px-28 grid gap-15 lg:grid-cols-2">
    @for (xp of experiences; track $index) {
      <app-experience-card
        [title]="xp.title"
        [subtitle]="xp.subtitle"
        [paths]="xp.path"
      ></app-experience-card>
    }
  </section>
</main>
<!-- Footer -->
<footer class="bg-slate-900">
  <div class="mx-auto max-w-7xl overflow-hidden px-6 py-12 lg:px-8">
    <app-links></app-links>
    <p class="mt-10 text-center text-xs leading-5 text-slate-500">
      &copy; {{ currentYear }} Leno Borges. Todos os direitos reservados.
    </p>
  </div>
</footer>
