<div class="grid gap-3 lg:w-[500px]">
  <h2 class="text-violet-400 text-lg font-semibold">{{ subtitle() }}</h2>
  <h1 class="text-3xl font-bold text-white">{{ title() }}</h1>
  @for (p of paths(); track $index) {
    <div class="p-3 grid gap-1 border-l border-t border-violet-400 rounded-tl">
      <p>
        <b class="font-semibold text-white text-lg">{{ p.path }}</b
        >: {{ p.description }}
      </p>
    </div>
  }
</div>
